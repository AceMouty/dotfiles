# color theme
include debris.conf

# font
font_family      Sauce Code Pro Nerd Font
bold_font        Sauce Code Pro Bold Nerd Font
italic_font      Sauce Code Pro Bold Italic Nerd Font
bold_italic_font Sauce Code Pro Italic Nerd Font
font_size 12

# input delay
input_delay 3

# Sync to monitor refresh reate, default: 100
sync_to_monitor yes

# make some breathing room
window_margin_width 10


# key mapping
map ctrl+left           resize_window narrower
map ctrl+right          resize_window wider
map ctrl+up             resize_window taller
map ctrl+down           resize_window shorter
map ctrl+enter          new_os_window_with_cwd
